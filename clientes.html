<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author" content="Guilherme Andraz">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="IMG/logo.png">
</head>

<body style="background: linear-gradient(to left, #6e30be80, #4439e080);">
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <!-- Logo-->
            <a class="navbar-brand" href="index.html">
                <img src="IMG/logo.png" alt="Logo" width="30" height="30" style="margin: 10px;">
                Sistema CRUD</a>
            <!-- Botão hambúrguer (mobile) -->
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <!-- Menu -->
            <div class="collapse navbar-collapse" id="menu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="integrante.html">Integrantes</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="clientes.html">Cliente</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="vendedor.html">Vendedor</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <!-- Formulario-->
    <div class="container mt-4">
        <h3 style="font-weight: bold;" class="text-dark">Clientes</h3>
        <input id="nome" class="form-control mb-2" placeholder="Nome" type="text"
            style="background-color: #fff; border-color:#2b045f; font-weight: bold;">
        <input id="email" class="form-control mb-2" placeholder="Email" type="email"
            style="background-color: #fff; border-color:#2b045f; font-weight: bold;">
        <input id="telefone" class="form-control mb-2" placeholder="Telefone " type="tel" inputmode="numeric"
            style="background-color: #fff; border-color:#2b045f; font-weight: bold;">
        <button id="salvar" class="btn btn-primary">Salvar</button>
        <button id="cancelar" class="btn btn-secondary">Cancelar</button>
        <small id="status" class="teste-muted"></small>
        <table class="table mt-3 table-bordered table-striped table-hover table-sm"
            style="border-color: #2a0e4e80; border-width: 2px; border-style: solid;">
            <tbody id="lista"></tbody>
        </table>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/clientes.js"></script>

</html>
